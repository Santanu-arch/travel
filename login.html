  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

  <style>
    /* Full-screen background video */
.background-video {
  position: fixed; /* Fixed position so it stays in the background */
  top: 0;
  left: 0;
  width: 100vw; /* 100% of the viewport width */
  height: 100vh; /* 100% of the viewport height */
  object-fit: cover; /* Ensures video covers the screen without stretching */
  object-position: center center; /* Ensures the video remains centered */
  z-index: -1; /* Places the video behind the content */
}

/* Mobile-specific adjustments */
@media (max-width: 768px) {
  .background-video {
    object-position: center center; /* Keeps the video centered on mobile */
  }
}

/* PC or large-screen adjustments */
@media (min-width: 1024px) {
  .background-video {
    object-position: center center; /* Keeps the video centered on larger screens */
  }
}

/* Extra-large screens (for example 4K or large desktop screens) */
@media (min-width: 1600px) {
  .background-video {
    object-position: center center; /* Keeps the video centered on very large screens */
  }
}


    /* Card Styling */
    .card {
      max-width: 400px; /* Limit width */
      margin: 50px auto; /* Center card */
      padding: 30px; /* Add padding */
      background-color: rgba(255, 255, 255, 0.8); /* White background with transparency */
      border-radius: 10px; /* Rounded corners */
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); /* Soft shadow effect */
    }

    /* Button Styling */
    .btn {
      width: 100%; /* Full width for button */
      padding: 10px; /* Padding for the button */
      font-size: 16px; /* Button font size */
      border-radius: 5px; /* Rounded button */
      transition: background-color 0.3s ease; /* Smooth transition */
    }

    .btn:hover {
      background-color: #004466; /* Darken color on hover */
    }

    /* Input Styling */
    .form-control {
      border-radius: 5px; /* Rounded inputs */
      padding: 10px; /* Padding for input fields */
      margin-top: 10px; /* Space above inputs */
      border: 1px solid #ccc; /* Light border for inputs */
    }

    /* Forgot Password and Register Links */
    a {
      text-decoration: none; /* Remove underline */
      color: #005477; /* Text color for links */
    }

    a:hover {
      color: #004466; /* Darker color when hovered */
    }

    /* Add spacing between elements */
    .text-center {
      margin-bottom: 15px; /* Space between each section */
    }

    /* Initially hide the second card */
    .signup-card {
      display: none;
    }
  </style>
</head>
<body>
  <!-- Background Video -->
  <video class="background-video" autoplay loop muted>
    <source src="login.mp4" type="video/mp4">
  </video>

  <!-- Navbar -->
  <nav class="navbar navbar-light bg-light">
    <div class="container-fluid">
      <!-- Toggler button (always visible) -->
      <a href="index.html" class="navbar-toggler" type="button">
        <span class="fa fa-arrow-left"></span>
      </a>

      <!-- Navbar brand (Logo) centered -->
      <a class="navbar-brand mx-auto" href="#">
        <b style="color: #005477;">Globe</b><b>Trek</b>
      </a>

      <!-- Help link on the right -->
      <a class="navbar-brand" href="#" style="color: #005477;">Help</a>
    </div>
  </nav>

  <!-- Sign In Card -->
  <div class="card shadow-lg rounded-lg signin-card">
    <div class="card-body">
      <h2 class="text-center" style="color: #005477;">Sign In</h2>
      <form action="/action_page.php">
        <div class="text-center mb-3 mt-3">
          <label for="email" class="form-label">Email:</label>
          <input type="email" class="form-control" id="email" placeholder="Enter email" name="email">
        </div>
        <div class="text-center mb-3">
          <label for="pwd" class="form-label">Password:</label>
          <input type="password" class="form-control" id="pwd" placeholder="Enter password" name="pswd">
        </div>
        <div class="text-center form-check mb-3">
          <label class="form-check-label">
            <input class="form-check-input" type="checkbox" name="remember"> Remember me
          </label>
          <span>&nbsp;</span>
          <span>&nbsp;</span>
          <span>&nbsp;</span>
          <a href="#">Forgot Password?</a>
        </div>
        <button type="submit" class="btn text-light text-center" style="background-color: #005477;">Sign In</button>
        <div class="login-register text-center mt-3">
          <p>Don't have an account? <a href="#" class="register-link" id="go-to-signup">Sign Up</a></p>
        </div>
      </form>
    </div>
  </div>
  
  <!-- Sign Up Card -->
  <div class="card shadow-lg rounded-lg signup-card">
    <div class="card-body">
      <h2 class="text-center" style="color: #005477;">Sign Up</h2>
      <form action="/action_page.php">
        <div class="text-center mb-3 mt-3">
          <label for="name" class="form-label">Username:</label>
          <input type="name" class="form-control" id="name" placeholder="Enter name" name="name">
        </div>
        <div class="text-center mb-3">
          <label for="email" class="form-label">E-mail:</label>
          <input type="email" class="form-control" id="email" placeholder="Enter email" name="email">
        </div>
        <div class="text-center mb-3">
          <label for="pwd" class="form-label">Password:</label>
          <input type="password" class="form-control" id="pwd" placeholder="Enter password" name="pswd">
        </div>
        <div class="text-center mb-3">
          <label for="pwd" class="form-label">Confirm Password:</label>
          <input type="password" class="form-control" id="cpwd" placeholder="Enter password again" name="cpswd">
        </div>
        <div class="text-center form-check mb-3">
          <label class="form-check-label">
            <input class="form-check-input" type="checkbox" name="remember"> I agree to
          </label>
          <a href="#">terms & conditions</a>
        </div>
        <button type="submit" class="btn text-light text-center" style="background-color: #005477;">Sign Up</button>
        <div class="login-register text-center mt-3">
          <p>Already have an account? <a href="#" class="login-link" id="go-to-signin">Sign In</a></p>
        </div>
      </form>
    </div>
  </div>

  <script>
    // jQuery to handle showing and hiding cards with fade effect
    $('#go-to-signup').click(function(event) {
      event.preventDefault();
      $('.signin-card').fadeOut(300); // Fade out sign-in card in 300ms
      $('.signup-card').fadeIn(300);  // Fade in sign-up card in 300ms
    });

    $('#go-to-signin').click(function(event) {
      event.preventDefault();
      $('.signup-card').fadeOut(300); // Fade out sign-up card in 300ms
      $('.signin-card').fadeIn(300);  // Fade in sign-in card in 300ms
    });
  </script>
</body>
</html>
